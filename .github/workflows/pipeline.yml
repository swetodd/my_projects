#---------------------------
# CI/CD pipeline
# deploying to DockerHub
#---------------------------
on:
    push:
        branches:
            master

jobs:
    build:
        runs-on: ubuntu-22.04
        steps:
        - name: Checkout code 
          uses: actions/checkout@v4
        - name: Start of the building
          run: echo "Building started"
        - name: Building
          run: docker build -t "rsa_encoder_final" .
    test:
        needs: [build]
        runs-on: ubuntu-22.04
        steps:
        - name: Checkout code 
          uses: actions/checkout@v4

        - name: "Start of the testing"
          run: echo "Testing started"
        - name: "Compile tests"
          run: g++ -o test_rsa test_rsa.cpp

        - name: "launching tests"
          run: ./test_rsa

        - name: "test completed"
          run: echo "tests passed"

      deploy:
        needs: [test]
        runs-on: ubuntu-22.04
        steps:
         - name: "Start of the deploying to docker hub"
           run: echo "Deploy to  dockerHub started"

         - name: Checkout code
           uses: actions/checkout@v4
         - name: Log in to DockerHub
           uses: docker/login-action@v3
           with:
             username: ${{ secrets.DOCKER_USERNAME }}
             password: ${{ secrets.DOCKER_PASSWORD }}
         - name: "pushing to DockerHub"
           run: docker push swetodd/rsa_necoder_final:latest

         - name: Push to DockerHub
           run: docker push swetodd/rsa_encoder_final:latest         
         - name: Successfully deployed
           run: echo "Successfully deployed"

         - name: Successfully done
           run: echo "Successfully done"
