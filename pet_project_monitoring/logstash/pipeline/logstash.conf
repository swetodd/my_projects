input {
  # TCP вход для прямого приема логов от приложения
  tcp {
    port => 5001
    codec => json_lines
  }
  
  # Оставляем на будущее (если вернешь Filebeat)
  beats {
    port => 5044
  }
}

filter {
  # Если пришел JSON - парсим
  json {
    source => "message"
    target => "parsed"
    skip_on_invalid_json => true
  }
  
  # Извлекаем поля из JSON
  if [parsed] {
    mutate {
      rename => {
        "[parsed][timestamp]" => "@timestamp"
        "[parsed][level]" => "log_level"
        "[parsed][message]" => "log_message"
        "[parsed][module]" => "module"
        "[parsed][function]" => "function_name"
        "[parsed][line]" => "line_number"
      }
      remove_field => ["parsed"]
    }
  }
  
  # Добавляем поле с типом лога
  if [log_level] == "ERROR" {
    mutate {
      add_field => { "log_type" => "error" }
    }
  } else {
    mutate {
      add_field => { "log_type" => "info" }
    }
  }
  
  # Извлекаем user_id если есть
  if [user_id] {
    mutate {
      convert => { "user_id" => "string" }
    }
  }
  
  # Приводим timestamp к правильному формату
  date {
    match => ["@timestamp", "ISO8601"]
    target => "@timestamp"
  }
}

output {
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "weather-app-logs-%{+YYYY.MM.dd}"
  }
  
  # Для отладки - выводим в консоль
  stdout {
    codec => rubydebug
  }
}