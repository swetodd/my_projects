filebeat.inputs:
  - type: container
    paths:
      - /var/lib/docker/containers/*/*.log
    processors:
      - add_docker_metadata: ~
      - decode_json_fields:
          fields: ["message"]
          target: "json"
          overwrite_keys: true
          add_error_key: true

  - type: log
    enabled: true
    paths:
      - /var/log/weather-app.log
    fields:
      app: weather-app
    fields_under_root: true

output.logstash:
  hosts: ["logstash:5044"]

logging.level: info
